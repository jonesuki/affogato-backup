#####################################################################
#   Fan Control
#####################################################################
# Part Cooling Fan
[fan]
pin: !orbitoolO2S:PA10
enable_pin: orbitoolO2S:PB14
off_below: 0.2
tachometer_pin: orbitoolO2S:PA14
tachometer_ppr: 2
tachometer_poll_interval: 0.0005
shutdown_speed: 0.0
cycle_time: 0.0001 # 10KHz control signal frequency
kick_start_time: 0.2
hardware_pwm: False

#  Hotend Fan
[heater_fan Hotend_Fan]
pin: !orbitoolO2S:PB15  
tachometer_pin: orbitoolO2S:PB12
tachometer_ppr: 2
tachometer_poll_interval: 0.0005
heater: extruder
cycle_time: 0.0001                 # 10KHz PWM frecvency, do NOT lower this value
heater_temp: 75
fan_speed: 1.0                     # If you are experiencing back flow, you can reduce fan_speed; can be lowered to reduce fan noise
hardware_pwm: false
shutdown_speed: 0.0
max_power: 0.5                     # max 0.5 for 12V fan, 1.0 for 24V, can be lowered to reduce fan noise

#  Controller / Electronics Bay Fan - FAN2
[controller_fan Electronics_Fan]
pin: PD12
max_power: 0.25
kick_start_time: 0.5
idle_timeout: 30
heater: heater_bed
stepper: stepper_x,stepper_y,stepper_z,stepper_z1,stepper_z2,stepper_z3
#[fan_generic Electronics_Fan]
#pin: PD12
#max_power: 1.0
#shutdown_speed: 0.0
#kick_start_time: 5.0

#  Exhaust Fan - FAN3
[fan_generic Exhaust_Fan]
pin: PD13
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0


#####################################################################
#   LED Control
#####################################################################
# Chamber Lighting - HE2 Connector (Optional)
[output_pin chamber_light]
pin: PB10
pwm:true
shutdown_value: 0
value:0
cycle_time: 0.01


#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################
[idle_timeout]
timeout: 7200

[safe_z_home]
home_xy_position:150,150    # Should be centre of bed as required by Cartographer
speed:100
z_hop:10

[quad_gantry_level]
gantry_corners:
   -60,-10
   360,370
points:
   50,25
   50,225
   250,225
   250,25
speed: 100
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10


[cartographer]
mcu: cartographer
x_offset: 2.8 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 27 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: no # For extra output


#####################################################################
#   Bed Mesh, initial setting from Voron docs
#####################################################################
[bed_mesh]
zero_reference_position: 150, 150    # The centre of your bed. 
speed: 300
horizontal_move_z: 3
mesh_min: 40, 40
mesh_max: 260,260
probe_count: 20, 20
adaptive_margin: 10
mesh_pps: 0,0                        # Disable interpolation - mesh is probably dense enough


#####################################################################
#   Additional temperature sensors
#####################################################################
# Temperature sensor for Host (Raspberry Pi)
[temperature_sensor Raspberry_Pi]
sensor_type: temperature_host
sensor_path: /sys/class/thermal/thermal_zone0/temp

# Temperature sensor for MCU (Octopus Pro)
[temperature_sensor Octopus_Pro]
sensor_type: temperature_mcu
sensor_mcu: mcu

# Chamber temperature sensor
[temperature_sensor Chamber]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF4

# Hotend heatsink thermistor
[temperature_sensor Hotend_heatsink]
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PF5

# Orbitool O2S MCU temperature
[temperature_sensor toolboard]
sensor_type: temperature_mcu
sensor_mcu: orbitoolO2S

[output_pin T0_RUN_LED]
pin: orbitoolO2S:PB13
value: 1
shutdown_value: 0

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105


#####################################################################
#   Firmware Retraction (for Orbitor 2?)
#####################################################################
[firmware_retraction]
retract_length: 1.2 # user calibration needed
#   The length of filament (in mm) to retract when G10 is activated,
#   and to unretract when G11 is activated (but see
#   unretract_extra_length below). The default is 0 mm.
retract_speed: 120
#   The speed of retraction, in mm/s. The default is 20 mm/s.
unretract_extra_length: 0.0
#   The length (in mm) of *additional* filament to add when
#   unretracting.
unretract_speed: 120
#   The speed of unretraction, in mm/s. The default is 10 mm/s.


#####################################################################
#   Input Sharper
#####################################################################
[adxl345 o2sADXL]
cs_pin: orbitoolO2S:PA4
spi_bus: spi1
axes_map: y, z, x # Assumes back-faceing vertical toolboard mounting
spi_speed: 5000000

[adxl345 cartoADXL]
cs_pin: cartographer:PA0 # For Cartographer V4
spi_bus: spi1

[resonance_tester]
accel_chip:adxl345 o2sADXL
probe_points:
    150,150,20

[input_shaper]
shaper_freq_x: 82.0
shaper_type_x: 2hump_ei
shaper_freq_y: 40.2
shaper_type_y: mzv

# Without side and top panel
#shaper_freq_x: 102.0
#shaper_type_x: 3hump_ei
#shaper_freq_y: 39.8
#shaper_type_y: mzv


#####################################################################
#   Enable skew correction (https://www.klipper3d.org/Skew_Correction.html#configure-your-skew)
#####################################################################
[skew_correction]

#####################################################################
#   Section needed in order to exclude object during print (https://www.klipper3d.org/Exclude_Object.html)
#####################################################################
[exclude_object]

#####################################################################
#   Macros
#####################################################################
[gcode_macro G32]
gcode:
    SAVE_GCODE_STATE NAME=STATE_G32
    G90
    G28

    QUAD_GANTRY_LEVEL
    G28
#   G0 X150 Y150 Z30 F3600                               ; removed, Voron Tap already set Z-homing at centre of bed

    RESTORE_GCODE_STATE NAME=STATE_G32

#   Use PRINT_START for the slicer starting script - please customise for your slicer of choice
[gcode_macro PRINT_START]
gcode:
    # - Jones(Ellis's tuning guide)
    # Parameters
    {% set bedtemp = params.BED|int %}
    {% set hotendtemp = params.HOTEND|int %}
    # {% set chambertemp = params.CHAMBER|default(0)|int %}

    G28                                                  ; initial homing, required for clean_nozzle macro

    M190 S{bedtemp}                                      ; set & wait for bed temp
    # TEMPERATURE_WAIT SENSOR="temperature_sensor chamber" MINIMUM={chambertemp}   ; wait for chamber temp

    M109 S175                                            ; pre-heat extruder to 175C for easy nozzle cleaning
    clean_nozzle                                         ; scrub nozzle to remove any oozing, before G28 (won't purge if hotend temperature is below 240C)

    {% if hotendtemp*0.75 <= 150 %}
        M109 S{(hotendtemp*0.75)|round(0,'ceil')|int}    ; pre-heat extruder to 75% of target temperature
    {% else %}
        M109 S150                                        ; Or, to maximum of 150C
    {% endif %}
    
    BED_MESH_CLEAR
    G32                                                  ; home all axes G32 = G28 + QGL + G28 + move to bed center
    BED_MESH_CALIBRATE                                   ; bed mesh, should be after any homing and leveling routines like G28, G32, QUAD_GANTRY_LEVEL
    G28 Z                                                ; final Z homing, after heated bed and hotend

    G90                                                  ; absolute positioning

#   No longer necessary with Smart_Park?
#   G1 X275 Y300 Z20 F3000                               ; move nozzle away from bed

    Smart_Park                                           ; A feature of KAMP, move the printhead near the print area to do final heating

    M109 S{hotendtemp}                                   ; set & wait for hotend temp

    SKEW_PROFILE LOAD=Fillamentum_Extrafill_ASA_Natural    ; Load skew profile

#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
[gcode_macro PRINT_END]
gcode:
    SET_SKEW CLEAR=1

    # safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    
    M400                                                 ; wait for buffer to clear
    G92 E0                                               ; zero the extruder
    G1 E-6.0 F1800                                       ; - Jones (retract filament back from -10 to -5?)<G1 E-5.0 F1800
    
    TURN_OFF_HEATERS
    
    G90                                                  ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000              ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600
    
    M107                                                 ; turn off fan
    
    BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END

