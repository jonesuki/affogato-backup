# Park front right
[gcode_macro PARKFRONT]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                           ; home if not already homed
    {% endif %}
    SAVE_GCODE_STATE NAME=PARKFRONT
    G90                               ; absolute positioning
    G0 X150 Y{printer.toolhead.axis_minimum.y} Z75 F6000        
    RESTORE_GCODE_STATE NAME=PARKFRONT

# Park centre
[gcode_macro PARKCENTRE]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                           ; home if not already homed
    {% endif %}
    SAVE_GCODE_STATE NAME=PARKCENTRE
    G90                               ; absolute positioning
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_maximum.y/2} Z10 F6000      
    RESTORE_GCODE_STATE NAME=PARKCENTRE

# Turn on chamber light
[gcode_macro CHAMBER_LED_ON]
gcode:
    # Parameters
    {% set level = params.LEVEL|default(0.25)|float %}

    SAVE_GCODE_STATE NAME=CHAMBER_LED_ON
    SET_PIN PIN=chamber_light VALUE={level}
    RESTORE_GCODE_STATE NAME=CHAMBER_LED_ON

# Turn off chamber light
[gcode_macro CHAMBER_LED_OFF]
gcode:
    SAVE_GCODE_STATE NAME=CHAMBER_LED_OFF
    SET_PIN PIN=chamber_light VALUE=0.00
    RESTORE_GCODE_STATE NAME=CHAMBER_LED_OFF

