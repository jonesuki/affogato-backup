[include mainsail.cfg]
[include orbitoolO2S_leds.cfg]
[include object_cancellation.cfg]
[include mini12864_lcd.cfg]
[include bedfans.cfg]
[include timelapse.cfg]
[include KAMP_Settings.cfg]
[include nozzle_scrub.cfg]
[include gcodes-misc.cfg]
[include shaketune.cfg]

#####################################################################
# MCU - BTT Octopus Pro
#####################################################################
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f429xx_25004C000F50304738313820-if00
restart_method: command


#####################################################################
# MCU - Orbitool O2S Toolhead PCB
#####################################################################
[mcu orbitoolO2S]
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_Orbitool_O2S-if00
restart_method: command

[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 6500                   # - Jones<max_accel: 8000
max_z_velocity: 15                 #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

#####################################################################
#   MCU - Cartographer
#####################################################################
[mcu cartographer]
serial: /dev/serial/by-id/usb-Cartographer_stm32g431xx_3E0055000650303448383620-if00
restart_method: command


#####################################################################
#   X/Y Stepper Settings
#####################################################################
# B Stepper Left (LDO-42STH48-2004MAH(VRN)); connected to MCU MOTOR_0; Endstop connected to DIAG_0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 64                     # - Jones (quiet down stepper)<microsteps: 32
full_steps_per_rotation:400        # - Jones (for 0.9 degree stepper)<full_steps_per_rotation:200
endstop_pin: orbitoolO2S:PA2
position_min: 0
position_endstop: 300
position_max: 300
homing_speed: 50                   # Max 100, previous: 25
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC4
interpolate: false
run_current: 1.0                   # - Jones (quiet down stepper, max 1.4A, MUST equipped with electronics cooling fan)<run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

# A Stepper Right (LDO-42STH48-2004MAH(VRN)); connected to MCU MOTOR_1; Endstop connected to DIAG_1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 64                     # - Jones (quiet down stepper)<microsteps: 32
full_steps_per_rotation:400        # - Jones (for 0.9 degree stepper)<full_steps_per_rotation:200
endstop_pin: PG9
position_min: 0
position_endstop: 300
position_max: 300
homing_speed: 50                   # Max 100, previous 25
homing_retract_dist: 5
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PD11
interpolate: false
run_current: 1.0                   # - Jones (quiet down stepper, max 1.4A, MUST equipped with electronics cooling fan)<run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
#   Z Stepper Settings
#####################################################################
# Z0 Stepper - Front Left (LDO-42STH48-2004AC(VRN)); connected to MCU MOTOR_2; Endstop connected to DIAG_2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop    # Cartographer
homing_retract_dist: 0
position_max: 240                       # Z-Rail max: 275; 240 for umbilical cable and chamber thermistor
position_min: -5
homing_speed: 8
second_homing_speed: 3

[tmc2209 stepper_z]
uart_pin: PC6
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999      # - Jones<stealthchop_threshold: 0

# Z1 Stepper - Rear Left (LDO-42STH48-2004AC(VRN)); connected to MCU MOTOR_3
[stepper_z1]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999      # - Jones<stealthchop_threshold: 0

# Z2 Stepper - Rear Right (LDO-42STH48-2004AC(VRN)); connected to MCU MOTOR_4
[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999      # - Jones<stealthchop_threshold: 0

# Z3 Stepper - Front Right (LDO-42STH48-2004AC(VRN)); connected to MCU MOTOR_5
[stepper_z3]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999      # - Jones<stealthchop_threshold: 0


#####################################################################
#   Extruder
#####################################################################
# Extruder (LDO-36STH20-1004AHG)
[extruder]
step_pin = orbitoolO2S:PB3
dir_pin = !orbitoolO2S:PB4
enable_pin = !orbitoolO2S:PC14
microsteps = 32
rotation_distance = 4.69           # rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
full_steps_per_rotation: 200       # 200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.750

heater_pin = orbitoolO2S:PB9
sensor_pin = orbitoolO2S:PA1
pullup_resistor = 2200
sensor_type: PT1000
min_temp: -1                       # - Jones(to adopt the ambient temperature in garage)<min_temp: 10
max_temp: 270
pressure_advance: 0.025            # StealthBurner:0.045
pressure_advance_smooth_time: 0.03 # StealthBurner:0.040
max_extrude_only_distance: 101     # - Jones(Ellis's tuning guide)
max_extrude_only_velocity: 120
max_extrude_cross_section = 20     # KAMP requires >=5
min_extrude_temp: 180              # - Jones<min_extrude_temp: 170 (increase to 180 as recommended by OrbiterProject)
smooth_time = 0.5
max_power: 0.995                   # limit heater power to 99.5% to enable autorecovery from short detection
pwm_cycle_time: 0.01               # to improve the heater power calculation accuracy
# gear_ratio: 7.5:1                  # Orbiter2: 7.5:1; StealthBurner/Clockwork2: 50:10, not specified in sample config

[adc_temperature HOT_P]            # To display the actual power of the heater
temperature1:120 # value in Watts
#voltage1:1.32
voltage1:1.91 
temperature2:240 # value in Watts
voltage2:3.82 
#voltage2:2.64

[temperature_sensor Hotend_power]  # To display the actual power of the heater
sensor_pin: orbitoolO2S:PA0 
sensor_type: HOT_P

[tmc2240 extruder]                 # configuration for O2S toolboard
uart_pin: orbitoolO2S:PC13
interpolate: false
run_current: 0.85
rref: 12000
stealthchop_threshold: 0           # or 99999?
#driver_TBL: 0
#driver_HEND: 3
#river_HSTRT: 7
#driver_TOFF: 4


#####################################################################
#   Bed Heater
#####################################################################
# SSR Pin - HE1; Thermistor - TB
[heater_bed]
heater_pin: PA3
sensor_type: Generic 3950
sensor_pin: PF3
# max_power: 0.74                    # - Jones(Adjust Max Power so your heater doesn't warp your bed. Rule of thumb is 0.4watts/cm^2, (30.5*30.5*0.4)/500 = 0.7442)<max_power: 0.6
max_power: 1.0
min_temp: 0
max_temp: 120
# Superseded after PID tuning, at the end of file
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769


